name: Auto Activity Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update README
        run: |
          echo "<!-- last_update: $(date) -->" >> README.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add README.md
          
          # Коммитим и пушим в ветку main
          git commit -m "chore: daily activity update [skip ci]" || exit 0
          git push origin HEAD:main
